<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Inquiry</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; }
  .email-container { max-width: 600px; margin: 20px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .header { background-color: #0d47a1; color: #ffffff; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
  .content { padding: 30px; color: #333333; line-height: 1.6; }
  .detail-row { margin-bottom: 15px; border-bottom: 1px solid #eeeeee; padding-bottom: 10px; }
  .detail-label { font-weight: bold; color: #555555; display: block; margin-bottom: 5px; }
  .detail-value { font-size: 16px; }
  .footer { background-color: #f4f6f9; color: #888888; text-align: center; padding: 15px; font-size: 13px; }
  @media only screen and (max-width: 600px) {
    .email-container { width: 100% !important; border-radius: 0; margin: 0; }
  }
</style>
</head>
<body>
<div class="email-container">
  <div class="header">New Inquiry Received</div>
  <div class="content">
    <p>A new inquiry has been submitted on the Ankira Solutions website.</p>
    <div class="detail-row"><span class="detail-label">Name:</span> <span class="detail-value">{{ name }}</span></div>
    <div class="detail-row"><span class="detail-label">Phone:</span> <span class="detail-value">{{ phone }}</span></div>
    <div class="detail-row"><span class="detail-label">Email:</span> <span class="detail-value">{{ email }}</span></div>
    <div class="detail-row"><span class="detail-label">Course:</span> <span class="detail-value">{{ course }}</span></div>
    <div class="detail-row"><span class="detail-label">Message:</span> <span class="detail-value">{{ message|linebreaks }}</span></div>
  </div>
  <div class="footer">&copy; Ankira Solutions System</div>
</div>
</body>
</html>
