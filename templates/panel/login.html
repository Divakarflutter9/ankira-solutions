{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Ankira Solution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/panel.css' %}">
</head>

<body class="panel-body"
    style="display:block; background: linear-gradient(135deg, #060f26 0%, #0a2463 60%, #1e4db7 100%);">

    <div class="login-page">
        <div class="login-card">

            <!-- Logo -->
            <div class="login-logo-wrap">
                <div class="login-logo-icon">⚡</div>
                <div class="login-brand-name">Ankira<span>Solution</span></div>
            </div>

            <h1 class="login-title">Admin Login</h1>
            <p class="login-subtitle">Sign in to manage reviews and inquiries.</p>

            {% if error %}
            <div class="login-error">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'panel_login' %}" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" id="id_username" name="username" class="form-control"
                        placeholder="Enter admin username" autocomplete="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" id="id_password" name="password" class="form-control"
                        placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login">🔐 Sign In to Admin Panel</button>
            </form>

            <a href="{% url 'home' %}" class="login-back">← Back to Website</a>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
